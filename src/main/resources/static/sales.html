<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Use relative redirect so it works from IDE static server paths like /myprac/static/ -->
  <meta http-equiv="refresh" content="0; url=index.html" />
  <title>Redirecting...</title>
  <script>
    // Fallback redirect if meta doesn't trigger
    (function() {
      try {
        // Prefer relative path
        window.location.replace('index.html');
        // As a secondary fallback after 1s, try Spring Boot root URL
        setTimeout(function(){
          if (!document.hidden) {
            window.location.href = 'http://localhost:8080/';
          }
        }, 1000);
      } catch (e) {
        window.location.href = 'index.html';
      }
    })();
  </script>
  <style>
    body { font-family: Arial, sans-serif; padding: 40px; }
  </style>
</head>
<body>
  <p>Redirecting to the Sales dashboard...</p>
  <p>If you are not redirected automatically, <a href="index.html">click here</a> or open <a href="http://localhost:8080/">http://localhost:8080/</a> if the backend is running.</p>
</body>
</html>
