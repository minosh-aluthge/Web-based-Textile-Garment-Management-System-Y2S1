<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>TGMS — Production Management</title>
	<link rel="stylesheet" href="css/style.css">
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
</head>
<body>
	<div class="container">
		<header class="header">
			<div class="header-content">
				<h1><i class="fas fa-sitemap"></i> Production Management</h1>
				<p>Track order status across departments</p>
				<div class="header-links">
					<a href="dashboard.html" class="btn btn-secondary"><i class="fas fa-gauge-high"></i> Dashboard</a>
					<a href="production-products.html" class="btn btn-primary"><i class="fas fa-box"></i> Create clothing Item</a>
				</div>
			</div>
		</header>

		<div class="tab-content active">
			<div class="section-header">
				<h2><i class="fas fa-timeline"></i> Order Timeline</h2>
			</div>
			<div id="productionList" class="timeline"></div>
		</div>
	</div>

	<script>
	(async function load() {
		try {
			const res = await fetch('/api/sales/orders');
			const orders = res.ok ? await res.json() : [];
			const container = document.getElementById('productionList');
			if (orders.length === 0) {
				container.innerHTML = '<div class="loading">No orders found</div>';
				return;
			}
			container.innerHTML = orders.map(o => {
				const steps = ['Created','Cutting','Sewing','Washing','QC','Packing','Shipped'];
				const currentIdx = Math.min(steps.length-1, Math.floor(Math.random()*steps.length));
				return `
					<div class="timeline-item">
						<div class="timeline-header">
							<div class="timeline-title">Order #${o.id} — ${o.subject || 'N/A'}</div>
							<div class="timeline-meta">Customer: ${o.customer ? o.customer.name : 'N/A'}</div>
						</div>
						<div class="progress-steps">
							${steps.map((s, i) => `<div class="step ${i<=currentIdx?'done':''}"><span>${s}</span></div>`).join('')}
						</div>
					</div>
				`;
			}).join('');
		} catch (e) {
			console.error(e);
		}
	})();
	</script>
</body>
</html>
